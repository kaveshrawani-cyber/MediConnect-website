<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #e3f2fd, #f4f6f9);
}

/* Navbar */
.navbar {
    background: #2c3e50;
    padding: 18px;
    color: white;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

/* Container */
.container {
    width: 90%;
    max-width: 500px;
    margin: 30px auto;
}

/* Card */
.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    transition: 0.2s;
}

input:focus {
    border-color: #3498db;
    outline: none;
}

/* Button */
button {
    width: 100%;
    background: #3498db;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2980b9;
}

/* Appointment cards */
#appointments-list div {
    border: 1px solid #ddd;
    padding: 10px;
    border-radius: 8px;
    margin: 8px 0;
    background: #f9f9f9;
}

/* Popup */
.popup {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 15px 20px;
    border-radius: 8px;
    color: white;
    display: none;
}

.success { background: #2ecc71; }
.error   { background: #e74c3c; }

</style>
</head>

<body>

<div class="navbar">Book Appointment</div>

<div class="container">
    <div class="card">
        <h2>Fill Details</h2>

        <p id="doctor-info" style="font-weight: bold;"></p>

        <input type="text" id="name" placeholder="Your Name">
        <input type="text" id="phone" placeholder="Phone">
        <input type="date" id="date">

        <button onclick="bookAppointment()">Book Appointment</button>

        <div id="appointments-section" style="margin-top: 30px;">
            <h3>Your Appointments</h3>
            <div id="appointments-list"></div>
        </div>
    </div>
</div>

<!-- Popup -->
<div id="popup" class="popup"></div>

<script>

// Doctors data
const doctors = [
    { id: 1, name: "Dr. Ayesha Khan",  speciality: "Cardiologist",  city: "Mumbai" },
    { id: 2, name: "Dr. Rahul Sharma", speciality: "Dermatologist", city: "Thane" },
    { id: 3, name: "Dr. Priya Mehta",  speciality: "Pediatrician",  city: "Mumbai" },
    { id: 4, name: "Dr. Suresh Patil", speciality: "Orthopedic",    city: "Thane" }
];

// Get doctor from URL
const urlParams = new URLSearchParams(window.location.search);
const doctorId = parseInt(urlParams.get("id"));

const selectedDoctor = doctors.find(doc => doc.id === doctorId);

document.getElementById("doctor-info").textContent =
    selectedDoctor 
    ? `Booking for: ${selectedDoctor.name} (${selectedDoctor.speciality} - ${selectedDoctor.city})`
    : "Doctor not found";

// Popup function
function showPopup(message, type) {
    const popup = document.getElementById("popup");
    popup.textContent = message;
    popup.className = "popup " + type;
    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
    }, 3000);
}

// Load appointments
function loadAppointments() {
    const list = JSON.parse(localStorage.getItem("appointments")) || [];
    const container = document.getElementById("appointments-list");

    const filtered = list.filter(a => a.doctorId === doctorId);

    if (filtered.length === 0) {
        container.innerHTML = "<p style='color: gray;'>No appointments booked yet.</p>";
        return;
    }

    container.innerHTML = filtered.map(a => `
        <div>
            <p><b>Name:</b> ${a.name}</p>
            <p><b>Phone:</b> ${a.phone}</p>
            <p><b>Date:</b> ${a.date}</p>
        </div>
    `).join("");
}

// Book appointment
function bookAppointment() {

    // 🔐 Login check
    const isLoggedIn = localStorage.getItem("isLoggedIn");

    if (!isLoggedIn) {
        showPopup("❌ Please login first!", "error");
        return;
    }

    const name  = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const date  = document.getElementById("date").value;

    if (!name || !phone || !date) {
        showPopup("❌ Fill all fields!", "error");
        return;
    }

    if (!/^\d{10}$/.test(phone)) {
        showPopup("❌ Enter valid phone number!", "error");
        return;
    }

    const today = new Date().toISOString().split("T")[0];
    if (date < today) {
        showPopup("❌ Select future date!", "error");
        return;
    }

    const appointments = JSON.parse(localStorage.getItem("appointments")) || [];

    appointments.push({
        doctorId,
        name,
        phone,
        date
    });

    localStorage.setItem("appointments", JSON.stringify(appointments));

    showPopup("✅ Appointment booked!", "success");

    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("date").value = "";

    loadAppointments();
}

// Load on start
loadAppointments();

</script>

</body>
</html>
