<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediConnect</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
        }

        /* Navbar */
        nav {
            background: #2c3e50;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h2 {
            color: white;
            margin: 0;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #3498db;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 80px 20px;
        }

        .hero h1 {
            font-size: 40px;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .hero p {
            font-size: 18px;
            color: #555;
        }

        /* Button */
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: #3498db;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #2980b9;
        }

        /* Cards */
        .container {
            width: 90%;
            margin: auto;
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .card p {
            color: #666;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav>
        <h2>MediConnect</h2>
        <div>
            <a href="login.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="appointment.html">Appointment</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="hero">
        <h1>Welcome to MediConnect</h1>
        <p>Your smart healthcare companion</p>
        <a href="appointment.html" class="btn">Book Appointment</a>
    </div>

    <!-- Cards Section -->
    <div class="container">
       <div class="card">
    <h3>Find Doctors</h3>
    <p>Search for the best doctors near you.</p>
    <a href="menu.html" class="btn">Find Doctors</a>
        </div>

        <div class="card">
            <h3>Book Appointment</h3>
            <p>Schedule appointments easily in seconds.</p>
        </div>

        <div class="card">
            <h3>24/7 Support</h3>
            <p>Get help anytime, anywhere.</p>
        </div>
    </div>

</body>
</html>
